name: Build and Push Docker Image

on:
  push:
    branches: [ main, 'dev/v*' ]
  pull_request:
    branches: [ main, 'dev/v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (e.g., v1.2.3, 1.2.3, v1.2.3-alpha)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          path: ${{ github.event.repository.name }}
          fetch-depth: 0  # Required for NBGV to work properly
          
      - name: Clone other repos
        run: |
          git clone https://github.com/anobaka/Bakabase.Infrastructures.git
          git clone https://github.com/anobaka/LazyMortal.git
          
      - name: Clone private Bakabase.CI
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.BAKABASE_CI_TOKEN }}
          repository: anobaka/Bakabase.CI
          path: Bakabase.CI
          
      - name: List current directory
        run: |
          ls -l
          
      - name: Get NBGV version info
        uses: dotnet/nbgv@master
        with:
          path: ${{ github.event.repository.name }}
          setAllVars: true
        
      - name: Print NBGV version info
        run: |
          echo "NBGV Version: ${{ env.NBGV_CloudBuildNumber }}"
          echo "NBGV Assembly Version: ${{ env.NBGV_AssemblyVersion }}"
          echo "NBGV File Version: ${{ env.NBGV_FileVersion }}"
          echo "NBGV Informational Version: ${{ env.NBGV_InformationalVersion }}"
          echo "Working Directory: $(pwd)"
          echo "Git Branch: ${{ github.ref_name }}"
          echo "Git SHA: ${{ github.sha }}"

      - name: Determine Docker tag
        id: docker_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # 手动触发时使用输入的tag
            echo "docker_tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            # 推送tag触发时使用NBGV版本
            echo "docker_tag=${{ env.NBGV_CloudBuildNumber }}" >> $GITHUB_OUTPUT
          fi

      - name: Run build.sh in main repo
        run: |
          cd Bakabase.CI
          bash docker/build.sh -t ${{ steps.docker_tag.outputs.docker_tag }}

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Tag and push Docker image
        run: |
          docker tag bakabase:${{ steps.docker_tag.outputs.docker_tag }} ${{ secrets.DOCKERHUB_USERNAME }}/bakabase:${{ steps.docker_tag.outputs.docker_tag }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/bakabase:${{ steps.docker_tag.outputs.docker_tag }}