name: Build and Deploy

on:
  # Gate the pipeline on CI: only run after the CI workflow finishes on the
  # same commit, and only proceed if it succeeded. PR runs are filtered out
  # naturally — `branches:` here checks the run's head_branch, which for PRs
  # is the feature branch (not main / release/* / debug-actions).
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [ main, debug-actions, 'release/v*' ]
  # Manual override: runs the full pipeline without waiting for CI, useful when
  # CI is red for unrelated reasons or for commits whose push was [skip ci]'d.
  workflow_dispatch:

# Don't cancel an in-progress deploy — OSS uploads + GitHub releases shouldn't
# be torn down mid-flight. Serialize per target branch instead.
concurrency:
  group: deploy-${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    # Skip the entire pipeline unless CI succeeded on a push, or this is a
    # manual dispatch. Without this guard, workflow_run fires on every CI
    # completion regardless of outcome.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    outputs:
      version: ${{ steps.set-var.outputs.version }}
      is_tag: ${{ steps.set-var.outputs.is_tag }}
      sha: ${{ steps.target.outputs.sha }}
    steps:
      - name: Resolve target commit
        id: target
        # workflow_run runs in the default-branch context — github.sha points
        # at main's HEAD, not the commit CI actually validated. Pull the real
        # SHA off the triggering run so build/deploy/release work on it.
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "ref=${{ github.ref }}" >> $GITHUB_OUTPUT
            echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "ref=refs/heads/${{ github.event.workflow_run.head_branch }}" >> $GITHUB_OUTPUT
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.target.outputs.sha }}
          fetch-depth: 0

      - name: Setup .NET for NBGV
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: ./global.json

      - name: Get NBGV version info
        id: nbvg
        uses: dotnet/nbgv@v0.4.2
        with:
          setAllVars: true

      - name: Set version and tag info
        id: set-var
        run: |
          REF="${{ steps.target.outputs.ref }}"
          if [[ "$REF" == refs/tags/* ]]; then
            TAG_NAME="${REF#refs/tags/}"
            # strip leading 'v' or 'V' from tag when setting version
            TAG_NO_V="${TAG_NAME#v}"
            TAG_NO_V="${TAG_NO_V#V}"
            echo "version=${TAG_NO_V}" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
          else
            # Clean up version: remove trailing .0 for first beta (e.g., 2.2.0-beta.0 -> 2.2.0-beta)
            VERSION="${{ env.NBGV_CloudBuildNumber }}"
            if [[ "$VERSION" =~ ^(.+-[a-zA-Z]+)\.0$ ]]; then
              VERSION="${BASH_REMATCH[1]}"
            fi
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi
      - name: Debug prepare context
        run: |
          echo "github.event_name=${{ github.event_name }}"
          echo "github.ref=${{ github.ref }}"
          echo "github.sha=${{ github.sha }}"
          echo "workflow_run.head_branch=${{ github.event.workflow_run.head_branch }}"
          echo "workflow_run.head_sha=${{ github.event.workflow_run.head_sha }}"
          echo "workflow_run.event=${{ github.event.workflow_run.event }}"
          echo "workflow_run.conclusion=${{ github.event.workflow_run.conclusion }}"
          echo "resolved.ref=${{ steps.target.outputs.ref }}"
          echo "resolved.sha=${{ steps.target.outputs.sha }}"
          echo "resolved.version=${{ steps.set-var.outputs.version }}"
          echo "resolved.is_tag=${{ steps.set-var.outputs.is_tag }}"

  build:
    needs: [prepare]
    uses: ./.github/workflows/_build.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
      ref: ${{ needs.prepare.outputs.sha }}
    secrets: inherit

  deploy:
    needs: [prepare, build]
    uses: ./.github/workflows/_deploy.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
      ref: ${{ needs.prepare.outputs.sha }}
    secrets: inherit

  release:
    needs: [prepare, build]
    uses: ./.github/workflows/_release.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
      is_tag: ${{ needs.prepare.outputs.is_tag }}
      ref: ${{ needs.prepare.outputs.sha }}
    secrets: inherit

  cdn-refresh:
    runs-on: ubuntu-latest
    needs: [prepare, deploy, release]
    steps:
      - name: Install Alibaba Cloud CLI
        run: |
          curl -sL -o aliyun-cli.tgz https://aliyuncli.alicdn.com/aliyun-cli-linux-latest-amd64.tgz
          tar xzf aliyun-cli.tgz
          chmod +x aliyun

      - name: Configure Alibaba Cloud CLI
        run: |
          ./aliyun configure set \
            --profile default \
            --mode AK \
            --access-key-id ${{ secrets.CDN_ACCESS_KEY_ID }} \
            --access-key-secret ${{ secrets.CDN_ACCESS_KEY_SECRET }} \
            --region cn-hangzhou

      - name: Refresh CDN cache
        id: cdn-refresh
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          OBJECT_PATH="https://cdn-public.anobaka.com/app/bakabase/releases/
          https://cdn-public.anobaka.com/app/bakabase/archives/${VERSION}/
          https://cdn-public.anobaka.com/app/bakabase/scripts/"
          RESULT=$(./aliyun cdn RefreshObjectCaches \
            --ObjectPath "$OBJECT_PATH" \
            --ObjectType Directory)
          echo "$RESULT"
          TASK_ID=$(echo "$RESULT" | jq -r '.RefreshTaskId')
          echo "task_id=$TASK_ID" >> $GITHUB_OUTPUT

      - name: Verify CDN refresh completed
        run: |
          TASK_ID="${{ steps.cdn-refresh.outputs.task_id }}"
          echo "Waiting for CDN refresh task: $TASK_ID"
          for i in $(seq 1 12); do
            RESULT=$(./aliyun cdn DescribeRefreshTasks --TaskId "$TASK_ID")
            STATUS=$(echo "$RESULT" | jq -r '.Tasks.CDNTask[0].Status // empty')
            echo "Attempt $i: Status=$STATUS"
            if [ "$STATUS" = "Complete" ]; then
              echo "CDN refresh completed successfully"
              exit 0
            elif [ "$STATUS" = "Failed" ]; then
              echo "CDN refresh failed"
              echo "$RESULT" | jq .
              exit 1
            fi
            sleep 10
          done
          echo "CDN refresh timed out after 2 minutes (task may still be processing)"
          exit 1

      - name: Verify CDN serves new version
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          v=$(echo "$VERSION" | tr '[:upper:]' '[:lower:]')
          if [[ "$v" == *beta* ]]; then
            MANIFEST=releases.beta.json
          elif [[ "$v" == *rc* ]]; then
            MANIFEST=releases.rc.json
          else
            MANIFEST=releases.json
          fi
          echo "Verifying manifest: $MANIFEST, expected version: $VERSION"

          PLATFORMS=(win-x64 osx-x64 osx-arm64)
          FAILED=()
          for plat in "${PLATFORMS[@]}"; do
            URL="https://cdn-public.anobaka.com/app/bakabase/releases/${plat}/${MANIFEST}"
            OK=0
            for i in $(seq 1 6); do
              ACTUAL=$(curl -fsSL "$URL" | jq -r '.Assets[0].Version // empty' 2>/dev/null || echo "")
              echo "[$plat] attempt $i: got version='$ACTUAL', expected='$VERSION'"
              if [ "$ACTUAL" = "$VERSION" ]; then
                OK=1
                break
              fi
              sleep 5
            done
            if [ "$OK" -ne 1 ]; then
              FAILED+=("$plat")
            fi
          done

          if [ "${#FAILED[@]}" -gt 0 ]; then
            echo "::error::CDN still serves stale manifest after 30s for: ${FAILED[*]}"
            exit 1
          fi
          echo "All platforms serve version $VERSION"
